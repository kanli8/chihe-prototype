<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专家预约 - 科技风格 - 齿合平台</title>
    <link rel="stylesheet" href="../../styles/common.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: #0a0e27;
            color: #fff;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* 顶部装饰线 */
        .top-line {
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #7b2dff, #ff2d55, #00d4ff);
            background-size: 300% 100%;
            animation: gradientFlow 3s linear infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* 头部 */
        .page-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .page-header .back {
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
        }
        .page-header h1 {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 500;
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 玻璃卡片 */
        .glass-card {
            margin: 15px 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 18px;
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 12px;
        }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
        }

        /* 标签栏 */
        .tag-bar {
            display: flex;
            gap: 10px;
            padding: 0 20px 15px;
            overflow-x: auto;
        }
        .tag-item {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tag-item.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(123, 45, 255, 0.3));
            border-color: rgba(0, 212, 255, 0.5);
            color: #00d4ff;
        }

        /* 专家卡片 */
        .expert-list {
            padding: 0 20px 20px;
        }
        .expert-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .expert-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(0, 212, 255, 0.3);
        }
        .expert-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
        }
        .expert-info { flex: 1; }
        .expert-name {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .expert-dept {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }
        .expert-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .expert-tag {
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
        }
        .expert-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .expert-stats {
            display: flex;
            gap: 20px;
        }
        .expert-stat {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }
        .expert-stat strong {
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .book-btn {
            padding: 8px 18px;
            background: linear-gradient(135deg, #00d4ff, #7b2dff);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
            max-width: 430px;
            margin: 0 auto;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.65rem;
        }
        .bottom-nav .nav-item.active { color: #00d4ff; }
        .bottom-nav .nav-item .icon { font-size: 1.3rem; }
    </style>
</head>
<body>

    <div style="height: 90px;"></div>

    <!-- 底部导航 -->
