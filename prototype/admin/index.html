<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>齿合平台 - 后台管理系统</title>
    <link rel="stylesheet" href="../styles/common.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { text-align: center; }
        .container h1 { font-size: 2rem; margin-bottom: 10px; }
        .container p { color: #6b7280; margin-bottom: 40px; }
        .entry-list {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .entry-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 280px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .entry-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .entry-card .icon { font-size: 4rem; margin-bottom: 15px; }
        .entry-card h2 { font-size: 1.3rem; margin-bottom: 10px; }
        .entry-card p { font-size: 0.9rem; color: #6b7280; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦷 齿合平台</h1>
        <p>后台管理系统 · 原型预览</p>

        <div class="entry-list">
            <div class="entry-card" onclick="location.href='index.html'">
                <div class="icon">📊</div>
                <h2>数据看板</h2>
                <p>平台运营数据统计<br>门诊审核列表</p>
            </div>

            <div class="entry-card" onclick="location.href='content.html'">
                <div class="icon">📦</div>
                <h2>内容管理</h2>
                <p>课程/商品/专家/加盟方案<br>内容CRUD与上下架</p>
            </div>

            <div class="entry-card" onclick="location.href='clinic-audit.html'">
                <div class="icon">🏥</div>
                <h2>门诊审核</h2>
                <p>资质审核流程<br>通过/驳回操作</p>
            </div>

            <div class="entry-card" onclick="location.href='users.html'">
                <div class="icon">👥</div>
                <h2>用户管理</h2>
                <p>门诊/个人用户管理<br>禁用/启用控制</p>
            </div>

            <div class="entry-card" onclick="location.href='ai-knowledge.html'">
                <div class="icon">🤖</div>
                <h2>AI知识库</h2>
                <p>小齿/医小宝知识库<br>QA对与意图配置</p>
            </div>

            <div class="entry-card" onclick="location.href='finance.html'">
                <div class="icon">💰</div>
                <h2>订单与财务</h2>
                <p>订单流/加盟申请<br>营收数据报表</p>
            </div>
        </div>
    </div>
</body>
</html>
