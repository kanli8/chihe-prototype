<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>齿合平台 - 原型预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: #fff;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; opacity: 0.9; margin-bottom: 50px; }
        .entry-cards {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .entry-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .entry-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .entry-card .icon { font-size: 4rem; margin-bottom: 15px; }
        .entry-card h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .entry-card p { opacity: 0.8; font-size: 0.95rem; }
        .entry-card.admin { background: rgba(255,255,255,0.2); }

        .theme-section {
            margin-top: 60px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        .theme-section h2 { font-size: 1.3rem; margin-bottom: 20px; }
        .theme-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .theme-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>齿合平台</h1>
        <p class="subtitle">一站式口腔产业赋能SaaS平台 · 静态原型预览</p>
        <div class="entry-cards">
            <div class="entry-card" onclick="location.href='mobile/index.html'">
                <div class="icon">📱</div>
                <h2>移动端 H5 原型</h2>
                <p>小程序风格 · 门诊/个人双身份<br>六大模块 · AI智能助手</p>
            </div>
            <div class="entry-card admin" onclick="location.href='admin/index.html'">
                <div class="icon">💻</div>
                <h2>平台方后台</h2>
                <p>PC风格管理后台<br>内容管理 · 用户管理 · 数据看板</p>
            </div>
        </div>

        <div class="theme-section">
            <h2>🎨 多风格主题预览</h2>
            <div class="theme-btns">
                <button class="theme-btn" onclick="location.href='mobile/index.html'">默认蓝</button>
                <button class="theme-btn" onclick="location.href='mobile-green.html'">清新绿</button>
                <button class="theme-btn" onclick="location.href='mobile-orange.html'">活力橙</button>
                <button class="theme-btn" onclick="location.href='mobile-purple.html'">紫色优雅</button>
                <button class="theme-btn" onclick="location.href='mobile-minimal.html'">极简白</button>
                <button class="theme-btn" onclick="location.href='mobile-dark.html'">深色科技</button>
                <button class="theme-btn" onclick="location.href='mobile-pink.html'">粉色温馨</button>
                <button class="theme-btn" onclick="location.href='mobile-gold.html'">金色轻奢</button>
            </div>
        </div>
    </div>
</body>
</html>
