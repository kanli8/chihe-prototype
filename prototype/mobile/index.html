<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>齿合平台 - 移动端</title>
    <link rel="stylesheet" href="../styles/common.css">
    <style>
        body { background: #f5f5f5; }
        .page { padding-bottom: 0; }

        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }
        .hero .icon { font-size: 4rem; margin-bottom: 15px; }
        .hero h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .hero p { font-size: 0.9rem; opacity: 0.9; }

        .entry-section {
            padding: 20px;
        }
        .entry-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .entry-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }
        .entry-card:active { transform: scale(0.98); }
        .entry-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        .entry-info { flex: 1; }
        .entry-title { font-weight: 600; margin-bottom: 3px; }
        .entry-desc { font-size: 0.85rem; color: var(--text-secondary); }
        .entry-arrow { color: var(--text-muted); font-size: 1.2rem; }

        .quick-btns {
            display: flex;
            gap: 10px;
            padding: 0 20px 20px;
            flex-wrap: wrap;
        }
        .quick-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 15px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--text-primary);
        }
        .quick-btn:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <div class="icon">📱</div>
            <h1>移动端 H5 原型</h1>
            <p>小程序风格演示 · 门诊/个人双身份</p>
        </div>

        <div class="quick-btns">
            <a href="pages/login.html" class="quick-btn">📝 登录/注册</a>
            <a href="pages/home.html" class="quick-btn">🏠 门诊首页</a>
            <a href="pages/home.html?role=personal" class="quick-btn">👤 个人首页</a>
        </div>

        <div class="entry-section">
            <h3>📱 功能模块</h3>

            <div class="entry-card" onclick="location.href='pages/talent.html'">
                <div class="entry-icon" style="background: rgba(16, 185, 129, 0.1);">👥</div>
                <div class="entry-info">
                    <div class="entry-title">人才市场</div>
                    <div class="entry-desc">职位发布/简历库/聊天/面试邀约</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='pages/training.html'">
                <div class="entry-icon" style="background: rgba(59, 130, 246, 0.1);">📚</div>
                <div class="entry-info">
                    <div class="entry-title">培训学院</div>
                    <div class="entry-desc">课程学习/进度追踪/收藏</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='pages/marketing.html'">
                <div class="entry-icon" style="background: rgba(245, 158, 11, 0.1);">📣</div>
                <div class="entry-info">
                    <div class="entry-title">智能获客</div>
                    <div class="entry-desc">活动模板/线索管理/营销工具</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='pages/supply.html'">
                <div class="entry-icon" style="background: rgba(236, 72, 153, 0.1);">🛒</div>
                <div class="entry-info">
                    <div class="entry-title">供应链集采</div>
                    <div class="entry-desc">商品浏览/购物车/订单管理</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='pages/expert.html'">
                <div class="entry-icon" style="background: rgba(139, 92, 246, 0.1);">🏆</div>
                <div class="entry-info">
                    <div class="entry-title">专家预约</div>
                    <div class="entry-desc">专家库/档期/预约申请</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='pages/franchise.html'">
                <div class="entry-icon" style="background: rgba(14, 165, 233, 0.1);">🔐</div>
                <div class="entry-info">
                    <div class="entry-title">加盟赋能</div>
                    <div class="entry-desc">方案展示/加盟申请/进度查询</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='pages/ai-xiaochi.html'">
                <div class="entry-icon" style="background: rgba(139, 92, 246, 0.1);">🤖</div>
                <div class="entry-info">
                    <div class="entry-title">AI小齿</div>
                    <div class="entry-desc">智能客服/场景入口/转人工</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='pages/ai-yixiaobao.html'">
                <div class="entry-icon" style="background: rgba(245, 158, 11, 0.1);">📋</div>
                <div class="entry-info">
                    <div class="entry-title">AI医小宝</div>
                    <div class="entry-desc">医保合规问答/历史记录</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>
        </div>
    </div>
</body>
</html>
