<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历库 - 齿合平台</title>
    <link rel="stylesheet" href="../../styles/common.css">
    <style>
        body { background: var(--bg-light); }
        .header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

        .resume-list { padding: 15px; }
        .resume-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            cursor: pointer;
        }
        .resume-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .resume-info { flex: 1; }
        .resume-name { font-weight: 600; font-size: 1.05rem; margin-bottom: 5px; }
        .resume-meta { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .resume-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .resume-tag { padding: 2px 8px; background: var(--bg-light); border-radius: 4px; font-size: 0.75rem; color: var(--text-secondary); }
        .resume-actions { display: flex; gap: 8px; }
        .resume-action {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }
        .resume-action.chat { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .resume-action.invite { background: #10b981; color: #fff; }

        .filter-bar {
            display: flex;
            padding: 10px 15px;
            gap: 10px;
            background: #fff;
            overflow-x: auto;
        }
        .filter-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            background: #fff;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
        }
        .filter-btn.active { background: #10b981; color: #fff; border-color: #10b981; }
    </style>
</head>
<body>
    <header class="header">
        <a href="home.html" class="header-back">‹</a>
        <h1>简历库</h1>
        <span style="font-size: 1.4rem;">🔍</span>
    </header>

    <div class="filter-bar">
        <button class="filter-btn active">全部</button>
        <button class="filter-btn">口腔医生</button>
        <button class="filter-btn">护士</button>
        <button class="filter-btn">咨询师</button>
        <button class="filter-btn">前台</button>
        <button class="filter-btn">管理者</button>
    </div>

    <div class="resume-list">
        <div class="resume-card" onclick="alert('查看简历详情')">
            <div class="resume-avatar">👨‍⚕️</div>
            <div class="resume-info">
                <div class="resume-name">王医生（已脱敏）</div>
                <div class="resume-meta">5年经验 · 本科 · 期望薪资 15-20K</div>
                <div class="resume-tags">
                    <span class="resume-tag">种植牙</span>
                    <span class="resume-tag">正畸</span>
                    <span class="resume-tag">全科</span>
                </div>
            </div>
            <div class="resume-actions">
                <button class="resume-action chat" onclick="event.stopPropagation();alert('发起聊天')">💬</button>
                <button class="resume-action invite" onclick="event.stopPropagation();alert('发送面试邀约')">邀约</button>
            </div>
        </div>

        <div class="resume-card" onclick="alert('查看简历详情')">
            <div class="resume-avatar" style="background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);">👩‍⚕️</div>
            <div class="resume-info">
                <div class="resume-name">李护士（已脱敏）</div>
                <div class="resume-meta">3年经验 · 大专 · 期望薪资 6-8K</div>
                <div class="resume-tags">
                    <span class="resume-tag">四手操作</span>
                    <span class="resume-tag">消毒供应</span>
                </div>
            </div>
            <div class="resume-actions">
                <button class="resume-action chat" onclick="event.stopPropagation();alert('发起聊天')">💬</button>
                <button class="resume-action invite" onclick="event.stopPropagation();alert('发送面试邀约')">邀约</button>
            </div>
        </div>

        <div class="resume-card" onclick="alert('查看简历详情')">
            <div class="resume-avatar" style="background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);">👩‍💼</div>
            <div class="resume-info">
                <div class="resume-name">张咨询（已脱敏）</div>
                <div class="resume-meta">4年经验 · 大专 · 期望薪资 10-15K</div>
                <div class="resume-tags">
                    <span class="resume-tag">客户开发</span>
                    <span class="resume-tag">成单转化</span>
                    <span class="resume-tag">售后服务</span>
                </div>
            </div>
            <div class="resume-actions">
                <button class="resume-action chat" onclick="event.stopPropagation();alert('发起聊天')">💬</button>
                <button class="resume-action invite" onclick="event.stopPropagation();alert('发送面试邀约')">邀约</button>
            </div>
        </div>

        <div class="resume-card" onclick="alert('查看简历详情')">
            <div class="resume-avatar" style="background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);">👨‍💼</div>
            <div class="resume-info">
                <div class="resume-name">陈主任（已脱敏）</div>
                <div class="resume-meta">10年经验 · 硕士 · 期望薪资 30-40K</div>
                <div class="resume-tags">
                    <span class="resume-tag">门诊管理</span>
                    <span class="resume-tag">团队建设</span>
                    <span class="resume-tag">业绩提升</span>
                </div>
            </div>
            <div class="resume-actions">
                <button class="resume-action chat" onclick="event.stopPropagation();alert('发起聊天')">💬</button>
                <button class="resume-action invite" onclick="event.stopPropagation();alert('发送面试邀约')">邀约</button>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <a href="home.html" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">首页</span>
        </a>
        <a href="talent.html" class="tab-item active">
            <span class="tab-icon">👥</span>
            <span class="tab-label">人才</span>
        </a>
        <a href="training.html" class="tab-item">
            <span class="tab-icon">📚</span>
            <span class="tab-label">培训</span>
        </a>
        <a href="marketing.html" class="tab-item">

        </a>
        <a href="supply.html" class="tab-item">
            <span class="tab-icon">🛒</span>
            <span class="tab-label">集采</span>
        </a>
    </nav>
</body>
</html>
