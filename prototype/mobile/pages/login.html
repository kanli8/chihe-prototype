<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 齿合平台</title>
    <link rel="stylesheet" href="../../styles/common.css">
    <style>
        body { background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-container {
            padding: 60px 30px 30px;
            text-align: center;
            color: #fff;
        }
        .logo { font-size: 4rem; margin-bottom: 15px; }
        .app-name { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .app-slogan { font-size: 0.9rem; opacity: 0.9; margin-bottom: 50px; }

        .login-box {
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 40px 25px;
            min-height: calc(100vh - 200px);
        }

        .identity-tabs {
            display: flex;
            background: var(--bg-light);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 30px;
        }
        .identity-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s;
        }
        .identity-tab.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .login-form { text-align: left; }
        .phone-input {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }
        .phone-input .prefix {
            padding: 12px 15px;
            background: var(--bg-light);
            color: var(--text-primary);
            border-right: 1px solid var(--border-color);
        }
        .phone-input input {
            flex: 1;
            border: none;
            padding: 12px 15px;
            font-size: 1rem;
            outline: none;
        }

        .code-input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .code-input-group input { flex: 1; }

        .btn-get-code {
            padding: 12px 15px;
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        .agreement {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 20px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .agreement input { margin-top: 3px; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .identity-switch {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }
        .identity-switch p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .identity-btns {
            display: flex;
            gap: 15px;
        }
        .identity-btns .btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .identity-btns .btn:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }
        .identity-btns .btn .icon { font-size: 2rem; margin-bottom: 8px; }
        .identity-btns .btn .text { font-weight: 600; color: var(--text-primary); display: block; }
        .identity-btns .btn .desc { font-size: 0.8rem; color: var(--text-muted); display: block; margin-top: 3px; }

        .demo-switch {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-light);
            border-radius: 10px;
        }
        .demo-switch p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px; }
        .demo-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .demo-btn {
            padding: 8px 15px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .demo-btn:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🦷</div>
        <h1 class="app-name">齿合平台</h1>
        <p class="app-slogan">一站式口腔产业赋能SaaS平台</p>

        <div class="login-box">
            <div class="identity-tabs">
                <div class="identity-tab active" data-identity="clinic">门诊身份</div>
                <div class="identity-tab" data-identity="personal">个人身份</div>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <div class="phone-input">
                        <span class="prefix">+86</span>
                        <input type="tel" placeholder="请输入手机号" maxlength="11" id="phone">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="code-input-group">
                        <input type="text" class="form-input" placeholder="请输入验证码" maxlength="6" id="code">
                        <button type="button" class="btn-get-code" id="getCodeBtn">获取验证码</button>
                    </div>
                </div>

                <div class="agreement">
                    <input type="checkbox" id="agreement">
                    <label for="agreement">我已阅读并同意<a href="#" style="color: var(--primary);">《用户协议》</a>和<a href="#" style="color: var(--primary);">《隐私政策》</a></label>
                </div>

                <button type="submit" class="btn-login">登录</button>
            </form>

            <div class="identity-switch">
                <p>选择您的身份开始体验</p>
                <div class="identity-btns">
                    <button class="btn" onclick="quickLogin('clinic-admin')">
                        <div class="icon">🏥</div>
                        <span class="text">门诊管理</span>
                        <span class="desc">诊所管理者</span>
                    </button>
                    <button class="btn" onclick="quickLogin('clinic-staff')">
                        <div class="icon">👩‍⚕️</div>
                        <span class="text">门诊员工</span>
                        <span class="desc">咨询师/护士</span>
                    </button>
                    <button class="btn" onclick="quickLogin('personal')">
                        <div class="icon">👤</div>
                        <span class="text">个人用户</span>
                        <span class="desc">求职/合作</span>
                    </button>
                </div>
            </div>

            <div class="demo-switch">
                <p>演示开关（模拟不同角色权限）</p>
                <div class="demo-btns">
                    <button class="demo-btn" onclick="quickLogin('platform-admin')">平台管理员</button>
                    <button class="demo-btn" onclick="quickLogin('ai-advisor')">AI顾问演示</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 身份切换
        document.querySelectorAll('.identity-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.identity-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 获取验证码
        document.getElementById('getCodeBtn').addEventListener('click', function() {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length !== 11) {
                alert('请输入正确的手机号');
                return;
            }
            let seconds = 60;
            this.disabled = true;
            this.textContent = `${seconds}s后重试`;
            const timer = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(timer);
                    this.disabled = false;
                    this.textContent = '获取验证码';
                } else {
                    this.textContent = `${seconds}s后重试`;
                }
            }, 1000);
        });

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const identity = document.querySelector('.identity-tab.active').dataset.identity;
            location.href = `home.html?identity=${identity}`;
        });

        // 快速登录（演示用）
        function quickLogin(role) {
            location.href = `home.html?role=${role}`;
        }
    </script>
</body>
</html>
