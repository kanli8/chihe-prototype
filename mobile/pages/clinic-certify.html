<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门诊认证 - 齿合平台</title>
    <link rel="stylesheet" href="../../styles/common.css">
    <style>
        body { background: var(--bg-light); }

        .status-card {
            margin: 15px;
            padding: 25px;
            background: #fff;
            border-radius: 15px;
            text-align: center;
        }
        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 15px;
        }
        .status-icon.success { background: rgba(16, 185, 129, 0.1); }
        .status-icon.pending { background: rgba(245, 158, 11, 0.1); }
        .status-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
        .status-desc { font-size: 0.9rem; color: var(--text-secondary); }

        .info-section { padding: 0 15px 15px; }
        .info-section h3 { font-size: 1rem; margin-bottom: 12px; }
        .info-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
        }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { width: 100px; color: var(--text-secondary); font-size: 0.9rem; }
        .info-value { flex: 1; font-size: 0.9rem; }
        .info-images {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .info-images img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: var(--bg-light);
        }

        .form-section { padding: 0 15px 15px; }
        .form-section h3 { font-size: 1rem; margin-bottom: 12px; }
        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
        }
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
        }
        .upload-area:hover { border-color: var(--primary); }
        .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .upload-text { font-size: 0.9rem; color: var(--text-secondary); }
        .upload-formats { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }
    </style>
</head>
<body>
    <header class="header" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
        <a href="profile.html" class="header-back">‹</a>
        <h1>门诊认证</h1>
        <span></span>
    </header>

    <div class="status-card">
        <div class="status-icon success">✅</div>
        <div class="status-title">认证已通过</div>
        <div class="status-desc">您的门诊资质已审核通过，获得平台认证标识</div>
    </div>

    <div class="info-section">
        <h3>认证信息</h3>
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">门诊名称</span>
                <span class="info-value">博雅口腔门诊部</span>
            </div>
            <div class="info-row">
                <span class="info-label">统一社会信用代码</span>
                <span class="info-value">91330108MA2B12345X</span>
            </div>
            <div class="info-row">
                <span class="info-label">地址</span>
                <span class="info-value">杭州市江干区钱江路123号</span>
            </div>
            <div class="info-row">
                <span class="info-label">牙椅数量</span>
                <span class="info-value">8台</span>
            </div>
            <div class="info-row">
                <span class="info-label">法人代表</span>
                <span class="info-value">张三</span>
            </div>
            <div class="info-row">
                <span class="info-label">执业许可证</span>
                <div class="info-images">
                    <div style="width:80px;height:80px;background:var(--bg-light);border-radius:8px;display:flex;align-items:center;justify-content:center;">📄</div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-section">
        <h3>认证材料</h3>
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">营业执照</span>
                <div class="info-images">
                    <div style="width:80px;height:80px;background:var(--bg-light);border-radius:8px;display:flex;align-items:center;justify-content:center;">📄</div>
                </div>
            </div>
            <div class="info-row">
                <span class="info-label">医疗执业许可证</span>
                <div class="info-images">
                    <div style="width:80px;height:80px;background:var(--bg-light);border-radius:8px;display:flex;align-items:center;justify-content:center;">📄</div>
                </div>
            </div>
        </div>
    </div>

    <div style="padding: 15px;">
        <button class="btn btn-outline btn-block" onclick="alert('重新认证功能开发中...')">
            申请重新认证
        </button>
    </div>
</body>
</html>
