<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 齿合平台后台</title>
    <link rel="stylesheet" href="../styles/common.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 220px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px 0;
        }
        .logo {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .logo h1 { font-size: 1.3rem; margin: 0; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            cursor: pointer;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-item.active { background: rgba(59, 130, 246, 0.3); color: #fff; border-left: 3px solid #3b82f6; }
        .nav-item .icon { font-size: 1.2rem; margin-right: 12px; width: 24px; text-align: center; }

        .main { margin-left: 220px; min-height: 100vh; }

        .topbar {
            background: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
        }
        .breadcrumb { color: #6b7280; font-size: 0.9rem; }
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .content { padding: 30px; }
        .page-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 25px; color: #1f2937; }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            outline: none;
        }
        .search-bar input:focus { border-color: #3b82f6; }
        .search-bar select {
            padding: 10px 15px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            outline: none;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-outline { background: #fff; border: 1px solid #e5e7eb; }

        .table-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .table-header h3 { font-size: 1rem; font-weight: 600; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; font-size: 0.85rem; color: #6b7280; }
        td { font-size: 0.9rem; }
        tr:hover { background: #f9fafb; }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .status-tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .status-tag.success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-tag.warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .status-tag.danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .action-btn {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            background: #f3f4f6;
            margin-right: 5px;
        }
        .action-btn:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <h1>🦷 齿合平台</h1>
        </div>

        <a class="nav-item" onclick="location.href='index.html'">
            <span class="icon">📊</span>
            <span>数据看板</span>
        </a>
        <a class="nav-item" onclick="location.href='content.html'">
            <span class="icon">📦</span>
            <span>内容管理</span>
        </a>
        <a class="nav-item">
            <span class="icon">🏥</span>
            <span>门诊审核</span>
        </a>
        <a class="nav-item active">
            <span class="icon">👥</span>
            <span>用户管理</span>
        </a>
        <a class="nav-item">
            <span class="icon">🤖</span>
            <span>AI知识库</span>
        </a>
        <a class="nav-item">
            <span class="icon">💰</span>
            <span>订单与财务</span>
        </a>
        <a class="nav-item">
            <span class="icon">⚙️</span>
            <span>系统设置</span>
        </a>
    </aside>

    <main class="main">
        <div class="topbar">
            <span class="breadcrumb">首页 / 用户管理</span>
            <div class="user-avatar">管</div>
        </div>

        <div class="content">
            <h1 class="page-title">用户管理</h1>

            <div class="search-bar">
                <input type="text" placeholder="搜索用户ID/手机号/姓名...">
                <select>
                    <option>全部类型</option>
                    <option>门诊用户</option>
                    <option>个人用户</option>
                </select>
                <select>
                    <option>全部状态</option>
                    <option>正常</option>
                    <option>禁用</option>
                </select>
                <button class="btn btn-outline">筛选</button>
                <button class="btn btn-primary">搜索</button>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <h3>👥 用户列表</h3>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>用户</th>
                            <th>手机号</th>
                            <th>类型</th>
                            <th>身份</th>
                            <th>注册时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="avatar">博</div>
                                    <span>博雅口腔门诊部</span>
                                </div>
                            </td>
                            <td>138****8888</td>
                            <td>门诊</td>
                            <td>管理者</td>
                            <td>2026-01-15</td>
                            <td><span class="status-tag success">正常</span></td>
                            <td>
                                <button class="action-btn">详情</button>
                                <button class="action-btn">禁用</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="avatar" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%);">张</div>
                                    <span>张三</span>
                                </div>
                            </td>
                            <td>139****6666</td>
                            <td>个人</td>
                            <td>医生/求职</td>
                            <td>2026-02-20</td>
                            <td><span class="status-tag success">正常</span></td>
                            <td>
                                <button class="action-btn">详情</button>
                                <button class="action-btn">禁用</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="avatar" style="background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);">美</div>
                                    <span>美奥口腔诊所</span>
                                </div>
                            </td>
                            <td>137****5555</td>
                            <td>门诊</td>
                            <td>咨询师</td>
                            <td>2026-03-01</td>
                            <td><span class="status-tag success">正常</span></td>
                            <td>
                                <button class="action-btn">详情</button>
                                <button class="action-btn">禁用</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="avatar" style="background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);">李</div>
                                    <span>李四</span>
                                </div>
                            </td>
                            <td>136****4444</td>
                            <td>个人</td>
                            <td>护士</td>
                            <td>2026-03-15</td>
                            <td><span class="status-tag warning">禁用</span></td>
                            <td>
                                <button class="action-btn">详情</button>
                                <button class="action-btn">启用</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
