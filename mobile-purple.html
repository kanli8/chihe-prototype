<!DOCTYPE html>
<html lang="zh-CN" data-theme="purple">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>齿合平台 - 紫色优雅</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/theme-switcher.css">
    <style>
        body { background: var(--theme-bg); }
        .page { padding-bottom: 60px; }
        .hero {
            background: var(--gradient);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }
        .hero .icon { font-size: 4rem; margin-bottom: 15px; }
        .hero h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .hero p { font-size: 0.9rem; opacity: 0.9; }
        .entry-section { padding: 20px; }
        .entry-section h3 { font-size: 1rem; margin-bottom: 15px; color: var(--theme-text); }
        .entry-card {
            background: var(--theme-bg-card);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 8px var(--theme-shadow);
        }
        .entry-icon {
            width: 50px;
            height: 50px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        .entry-info { flex: 1; }
        .entry-title { font-weight: 600; margin-bottom: 3px; color: var(--theme-text); }
        .entry-desc { font-size: 0.85rem; color: var(--theme-text-secondary); }
        .entry-arrow { color: var(--theme-text-secondary); font-size: 1.2rem; }
        .back-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 20px auto;
            padding: 12px;
            background: var(--theme-bg-card);
            border: 2px solid var(--theme-primary);
            border-radius: var(--radius);
            color: var(--theme-primary);
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <div class="icon">💜</div>
            <h1>紫色优雅 · 主题预览</h1>
            <p>高贵典雅风 · 神秘优雅的紫色调</p>
        </div>

        <div class="entry-section">
            <h3>📱 快速入口</h3>

            <div class="entry-card" onclick="location.href='mobile/pages/home.html'">
                <div class="entry-icon" style="background: rgba(139, 92, 246, 0.15);">🏠</div>
                <div class="entry-info">
                    <div class="entry-title">首页</div>
                    <div class="entry-desc">进入移动端首页</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='mobile/pages/expert.html'">
                <div class="entry-icon" style="background: rgba(139, 92, 246, 0.15);">🏆</div>
                <div class="entry-info">
                    <div class="entry-title">专家预约</div>
                    <div class="entry-desc">专家库/档期预约</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='mobile/pages/ai-xiaochi.html'">
                <div class="entry-icon" style="background: rgba(139, 92, 246, 0.15);">🤖</div>
                <div class="entry-info">
                    <div class="entry-title">AI小齿</div>
                    <div class="entry-desc">智能客服对话</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>

            <div class="entry-card" onclick="location.href='admin/index.html'">
                <div class="entry-icon" style="background: rgba(139, 92, 246, 0.15);">💻</div>
                <div class="entry-info">
                    <div class="entry-title">平台后台</div>
                    <div class="entry-desc">数据看板/内容管理</div>
                </div>
                <span class="entry-arrow">›</span>
            </div>
        </div>

        <a href="index.html" class="back-btn">← 返回主题选择页</a>
    </div>

    <script src="js/theme-switcher.js"></script>
</body>
</html>
